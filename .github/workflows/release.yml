name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.os }}-${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,  arch: amd64, asset: claude-cli }
          - { os: linux,  arch: arm64, asset: claude-cli-linux-arm64 }
          - { os: darwin, arch: amd64, asset: claude-cli-darwin-amd64 }
          - { os: darwin, arch: arm64, asset: claude-cli-darwin-arm64 }
          - { os: windows, arch: amd64, asset: claude-cli.exe, ext: .exe }
          - { os: windows, arch: arm64, asset: claude-cli-arm64.exe, ext: .exe }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          ASSET: ${{ matrix.target.asset }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/$ASSET" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.asset }}
          path: dist/${{ matrix.target.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claude-cli
            dist/claude-cli-linux-arm64
            dist/claude-cli-darwin-amd64
            dist/claude-cli-darwin-arm64
            dist/claude-cli.exe
            dist/claude-cli-arm64.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
